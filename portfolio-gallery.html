<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manish Portfolio</title>

<style>
:root {
  --bg:#f8fafc;
  --panel:#fff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
  --hover:#f1f5f9;
}

body{
  margin:0;
  font-family:Segoe UI, Inter;
  background:var(--bg);
}

/* NAVBAR */
.navbar{
  height:56px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  position:sticky;
  top:0;
  z-index:1000;
}
.nav-btn{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:6px;
  text-decoration:none;
  color:var(--text);
  background:white;
}
.nav-btn:hover{background:var(--hover);}

/* Layout */
.layout{
  display:grid;
  grid-template-columns:260px 1fr;
  height:calc(100vh - 56px);
}

/* Sidebar */
.sidebar{
  border-right:1px solid var(--border);
  padding:16px;
}
.project-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.project-item:hover{background:var(--hover);}
.project-item.active{
  background:#e0ecff;
  color:var(--primary);
}

/* Main */
.main{
  padding:20px;
  overflow:auto;
}
.title{font-size:22px;font-weight:600;}
.desc{color:var(--muted);}

/* Image */
.image-wrap{position:relative;}
.main-image{
  width:100%;
  max-height:60vh;
  object-fit:contain;
  border:1px solid var(--border);
  border-radius:10px;
  cursor:zoom-in;
}

/* Arrows */
.nav-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(0,0,0,0.5);
  color:white;
  border:none;
  cursor:pointer;
  opacity:0;
}
.image-wrap:hover .nav-arrow{opacity:1;}
.nav-left{left:10px;}
.nav-right{right:10px;}

@media(max-width:768px){
  .nav-arrow{opacity:1;}
}

/* Thumbs */
.thumb-list{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.thumb{
  width:120px;
  border:1px solid var(--border);
  cursor:pointer;
}
.thumb.active{border:2px solid var(--primary);}
.thumb img{
  width:100%;
  height:80px;
  object-fit:cover;
}

/* MODAL FIXED */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:2000; /* FIXED */
}
.modal.active{display:block;}

.modal-stage{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:grab;
  z-index:1;
}
.modal-stage.dragging{cursor:grabbing;}

.zoom-image{
  max-width:90vw;
  max-height:85vh;
  transform-origin:center;
}

/* Modal arrows */
.modal-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;height:50px;
  border-radius:50%;
  background:white;
  border:none;
  cursor:pointer;
  z-index:2100; /* FIXED */
}
.modal-left{left:20px;}
.modal-right{right:20px;}

/* Controls */
.controls{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:6px;
  z-index:2100; /* FIXED */
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(6px);
  padding:6px;
  border-radius:8px;
}

.icon-btn{
  width:36px;height:36px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

/* Prevent click blocking */
.controls,
.modal-arrow{
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html" class="nav-btn">← Home</a>
  <div>Manish • Portfolio</div>
</div>

<div class="layout">

<div class="sidebar" id="projectList"></div>

<div class="main">
  <div class="title" id="title"></div>
  <div class="desc" id="desc"></div>

  <div class="image-wrap">
    <button class="nav-arrow nav-left" id="prevImageBtn">◀</button>
    <img id="mainImage" class="main-image">
    <button class="nav-arrow nav-right" id="nextImageBtn">▶</button>
  </div>

  <div class="thumb-list" id="thumbs"></div>

  <div id="tags"></div>
  <ul id="highlights"></ul>
</div>

</div>

<!-- Modal -->
<div class="modal" id="modal">

  <button class="modal-arrow modal-left" id="modalPrevBtn">◀</button>
  <button class="modal-arrow modal-right" id="modalNextBtn">▶</button>

  <div class="controls">
    <button class="icon-btn" id="zin">+</button>
    <button class="icon-btn" id="zout">-</button>
    <button class="icon-btn" id="zreset">⟳</button>
    <button class="icon-btn" id="close">✕</button>
  </div>

  <div class="modal-stage" id="stage">
    <img id="zoomImg" class="zoom-image">
  </div>

</div>

<script>
const projects = [
{
name:'Corporate Intranet Portal (OOTB)',
description:'Modern SharePoint intranet',
tech:['SharePoint','SPFx','M365'],
highlights:['Navigation','UX','Reusable components'],
images:[{src:'images/CoporateSite.png'}]
},
{
name:'Corporate Intranet Portal (SPFx)',
description:'SPFx intranet',
tech:['SharePoint','SPFx'],
highlights:['Custom UI'],
images:[{src:'images/spfx/home.png'}]
},
{
name:'Business Central App',
description:'Power Apps integration',
tech:['Power Apps','Power Automate'],
highlights:['Automation','Workflow'],
images:[
{src:'images/bc/1.png'},
{src:'images/bc/2.png'},
{src:'images/bc/3.png'}
]
},
{
name:'HR Management Solution',
description:'HR workflows system',
tech:['Power Apps','Dataverse'],
highlights:['Approvals','Tracking'],
images:[
{src:'images/hr/1.png'},
{src:'images/hr/2.png'},
{src:'images/hr/3.png'}
]
},
{
name:'Reporting Dashboard',
description:'Power BI analytics',
tech:['Power BI'],
highlights:['KPIs','Data insights'],
images:[
{src:'images/report/1.png'},
{src:'images/report/2.png'},
{src:'images/report/3.png'}
]
}
];

let pIndex=0,iIndex=0;
let scale=1,x=0,y=0,drag=false,sx=0,sy=0;

const img=document.getElementById("mainImage");
const zoom=document.getElementById("zoomImg");
const modal=document.getElementById("modal");
const stage=document.getElementById("stage");

/* Render */
function render(){
let p=projects[pIndex];

title.textContent=p.name;
desc.textContent=p.description;

img.src=p.images[iIndex].src;
zoom.src=img.src;

projectList.innerHTML="";
projects.forEach((proj,i)=>{
let d=document.createElement("div");
d.className="project-item"+(i===pIndex?" active":"");
d.textContent=proj.name;
d.onclick=()=>{pIndex=i;iIndex=0;render();};
projectList.appendChild(d);
});

thumbs.innerHTML="";
p.images.forEach((im,i)=>{
let t=document.createElement("div");
t.className="thumb"+(i===iIndex?" active":"");
t.innerHTML=`<img src="${im.src}">`;
t.onclick=()=>{iIndex=i;render();};
thumbs.appendChild(t);
});
}

/* Navigation */
prevImageBtn.onclick=()=>{let l=projects[pIndex].images.length;iIndex=(iIndex-1+l)%l;render();}
nextImageBtn.onclick=()=>{let l=projects[pIndex].images.length;iIndex=(iIndex+1)%l;render();}
modalPrevBtn.onclick=()=>prevImageBtn.onclick();
modalNextBtn.onclick=()=>nextImageBtn.onclick();

/* Modal */
img.onclick=()=>{modal.classList.add("active");scale=1;x=0;y=0;update();}

/* FIXED CLOSE BUTTON */
document.getElementById("close").addEventListener("click",(e)=>{
  e.stopPropagation();
  modal.classList.remove("active");
});

/* Outside click */
modal.addEventListener("click",(e)=>{
  if(e.target===modal) modal.classList.remove("active");
});

/* ESC */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape") modal.classList.remove("active");
});

/* Zoom */
stage.onwheel=e=>{e.preventDefault();scale+=e.deltaY<0?0.2:-0.2;update();}
stage.onmousedown=e=>{drag=true;sx=e.clientX-x;sy=e.clientY-y;stage.classList.add("dragging");}
window.onmousemove=e=>{if(!drag)return;x=e.clientX-sx;y=e.clientY-sy;update();}
window.onmouseup=()=>{drag=false;stage.classList.remove("dragging");}

zin.onclick=()=>{scale+=0.3;update();}
zout.onclick=()=>{scale-=0.3;update();}
zreset.onclick=()=>{scale=1;x=0;y=0;update();}

function update(){
zoom.style.transform=`translate(${x}px,${y}px) scale(${scale})`;
}

render();
</script>

</body>
</html>
